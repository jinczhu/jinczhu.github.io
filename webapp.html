<!DOCTYPE html>
<html>
    <head>
		<meta charset="UTF-8">
		<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
		<title>A Demo Of Webapp</title>
		<meta  name="viewport" content="initial-scale=1, width=device-width, maximum-scale=1, user-scalable=no">
		<script type="text/javascript" src="./dist/min.slip.js"></script>
		<style type="text/css">
			body{
				background-color: #f2f4f5;
				margin: 0;
				padding: 0;
			}
			img{
				width: 100%;
			}
		</style>
	</head>
	<body>
		<div id="container">

 <div class="row span7 text-center">
      
      <button class="btn btn-lg btn-danger" onclick="remote('power',1)">
        Power
      </button>
      <p>
      <button class="btn btn-lg btn-success" onclick="remote('input',1)">
        Input
      </button>
      <p>
      <div class="btn-group-vertical">
      <button class="btn btn-lg btn-primary" onclick="remote('volup', 1)">
        Volume Up 1
      </button>
      <button class="btn btn-lg btn-primary" onclick="remote('voldown', 1)">
        Volume Down 1
      </button>
      </div>
      <div class="btn-group-vertical">
      <button class="btn btn-lg btn-primary" onclick="remote('volup', 5)">
        Volume Up 5
      </button>
      <button class="btn btn-lg btn-primary" onclick="remote('voldown', 5)">
        Volume Down 5
      </button>
      </div>
      <p><p>
      <button class="btn btn-lg btn-primary" onclick="remote('mute',1)">
        Mute
      </button>
    </p>
  </div>
     
		  <div class="page page-1"><img src="images/sohutv-ccnn/1.jpg"></div>
		  <div class="page page-2"><img src="images/sohutv-ccnn/2.jpg"></div>
		  <div class="page page-3"><img src="images/sohutv-ccnn/3.jpg"></div>
		  <div class="page page-4"><img src="images/sohutv-ccnn/4.jpg"></div>
		</div>
	</body>
	<script type="text/javascript">
		var container = document.getElementById('container');
		var pages = document.querySelectorAll('.page');
		var slip = Slip(container, 'y').webapp(pages);
	</script>
</html>
